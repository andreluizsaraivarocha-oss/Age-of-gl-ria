<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Infinito Customizável</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #0f0f0f;
            color: #e0e0e0;
        }
        .card {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            min-width: 300px;
        }
        .label { color: #00ffcc; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; }
        #data-display { font-size: 3rem; font-weight: 800; margin: 15px 0; line-height: 1.2; }
        .mes-ano { color: #888; font-size: 1.5rem; display: block; }
        #cronometro { font-family: monospace; background: #000; padding: 5px 15px; border-radius: 5px; color: #555; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <div class="label">Simulação Temporal</div>
    <div id="data-display">
        <span id="dia">01</span><br>
        <span class="mes-ano"><span id="mes">Janeiro</span></span>
        <span id="ano">2024</span>
    </div>
    <div id="cronometro">00:00:00</div>
</div>

<script>
    // ==========================================
    // CONFIGURAÇÕES (ALTERE AQUI)
    // ==========================================
    const ANO_INICIAL = 1200;        // <--- Defina o ano que quiser aqui
    const MINUTOS_POR_ANO = 6;       // <--- Quantos minutos reais dura 1 ano
    // ==========================================

    const SEGUNDOS_POR_ANO = MINUTOS_POR_ANO * 60;
    const DATA_BASE = new Date(ANO_INICIAL, 0, 1);
    let segundosPassados = 0;

    function atualizar() {
        // Cálculo do avanço temporal
        const msNumAno = 365.25 * 24 * 60 * 60 * 1000;
        const progresso = segundosPassados / SEGUNDOS_POR_ANO;
        const dataAtual = new Date(DATA_BASE.getTime() + (progresso * msNumAno));

        // Atualização do HTML
        document.getElementById('dia').innerText = dataAtual.getDate().toString().padStart(2, '0');
        document.getElementById('mes').innerText = dataAtual.toLocaleDateString('pt-BR', { month: 'long' });
        document.getElementById('ano').innerText = dataAtual.getFullYear();

        // Cronômetro Real
        const h = Math.floor(segundosPassados / 3600).toString().padStart(2, '0');
        const m = Math.floor((segundosPassados % 3600) / 60).toString().padStart(2, '0');
        const s = (segundosPassados % 60).toString().padStart(2, '0');
        document.getElementById('cronometro').innerText = `Tempo Decorrido: ${h}:${m}:${s}`;

        segundosPassados++;
    }

    // Roda a função a cada 1 segundo real
    setInterval(atualizar, 1000);
    atualizar(); // Inicia imediatamente
</script>

</body>
</html>
